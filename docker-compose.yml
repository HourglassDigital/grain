version: '3.8'

services:
  realtime:
    build:
      context: .
      dockerfile: realtime/Dockerfile
    env_file: realtime/.env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('https://slack.com/api/api.test')"]
      interval: 60s
      timeout: 10s
      retries: 3
